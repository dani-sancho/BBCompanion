@if (iconPaths().length) {
    <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        [style]="iconSize()"
    >
        @for (path of iconPaths(); track path) {
            <path [attr.d]="path" />
        }
    </svg>
}
