@for (section of sections(); track section.title) {
  @defer (when section.data().length > 0) {
    <app-item-display
      [config]="section.data()"
      (itemHandler)="ola($event)"
      type="block"
      [title]="section.title"
    />
  } @placeholder {
    <!-- TODO: Use a list Skeleton maybe? -->
    <p>Cargando...</p>
  }
}

<button (click)="isModalOpen = true">Añadir alimento</button>

<app-modal title="Añadir alimento" [open]="isModalOpen" (isClosed)="isModalOpen = false">
  <p>Comprobando que se ve el modal</p>
</app-modal>

<mat-form-field [hideRequiredMarker]="true" [floatLabel]="'always'">
  <input matInput placeholder="Simple placeholder" required />
</mat-form-field>
